# GitHub Action to add Lytos to an existing repository.
#
# Usage: copy this file to your repo's .github/workflows/ and run it manually.
# Or trigger it via the Actions tab → "Add Lytos" → Run workflow.
#
# What it does:
# - Downloads the essential Lytos files from GitHub
# - Creates the .lytos/ directory structure
# - Creates CLAUDE.md at the root
# - Commits everything

name: Add Lytos

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: 'Project name'
        required: true
        default: 'My Project'
      ai_tool:
        description: 'AI tool (claude, cursor, or none)'
        required: false
        default: 'claude'

jobs:
  init:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if Lytos already exists
        run: |
          if [ -d ".lytos" ]; then
            echo "Error: .lytos/ already exists in this repo."
            exit 1
          fi

      - name: Download and run installer
        run: |
          curl -fsSL https://raw.githubusercontent.com/getlytos/lytos-method/main/install.sh -o /tmp/install.sh
          bash /tmp/install.sh --name "${{ github.event.inputs.project_name }}" --tool "${{ github.event.inputs.ai_tool }}"

      - name: Commit
        run: |
          git config user.name "Lytos"
          git config user.email "noreply@lytos.dev"
          git add -A
          git commit -m "feat: add Lytos (${{ github.event.inputs.project_name }})"
          git push
